name: Automated Affiliate Funnel Monitor

# Trigger matrix: Runs automatically every morning at 6:00 AM UTC (1:00 AM EST) 
# and can also be triggered manually directly inside GitHub
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  audit-funnel:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Source Code
      uses: actions/checkout@v4

    - name: Initialize Stable Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Run High-Velocity Revenue Funnel Audit
      run: |
        if [ -f "monitor-funnel.js" ]; then
          node monitor-funnel.js
        else
          echo "🚨 CRITICAL ERROR: monitor-funnel.js was not found in the root directory!"
          exit 1
        fi

    # Optional: If the monitor-funnel.js script fails (returns exit 1), 
    # GitHub will natively mark this run as failed and email your account instantly.
